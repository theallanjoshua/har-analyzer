name: Publish HAR Analyzer Components to NPM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/components/**' # Trigger whenever files in the components package change

permissions:
  id-token: write  # Required for OIDC
  contents: write  # Grant write permissions to push version increment changes

# Allow only one concurrent action under a group
concurrency:
  group: "har-analyzer"
  # Waits until the previous action in the same group finishes before starting a new one
  cancel-in-progress: false

jobs:
  publish-har-analyzer-components:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure you check out the actual branch instead of detached HEAD for git push
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0 # Fetches all history for all tags and branches

      - name: Set up Node.js runtime
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*' # Use the latest stable LTS version of Node.js
          registry-url: 'https://registry.npmjs.org'

      - name: Install latest pnpm & npm
        run: npm install -g pnpm@latest npm@latest

      - name: Clean install dependencies
        run: pnpm install --frozen-lockfile # Uses dependencies from the lockfile instead of package.json

      - name: Bump patch version
        # Go to the package directory and bump the version
        run: |
          cd packages/components
          pnpm version patch --no-git-tag-version

      - name: Ensure build passes before publishing
        run: pnpm validate

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "ci: bump packages/components version to $(node -p "require('./packages/components/package.json').version") [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        # only npm binary (not pnpm) can publish using the OIDC protocol
        run: |
          cd packages/components
          npm publish

