name: Deploy Website to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent action under a group
concurrency:
  group: "har-analyzer"
  # Waits until the previous action in the same group finishes before starting a new one
  cancel-in-progress: false

jobs:
  build-har-analyzer-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure you check out the actual branch instead of detached HEAD for git push
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0 # Fetches all history for all tags and branches

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*' # Use the latest stable LTS version of Node.js

      - name: Install latest pnpm & npm
        run: npm install -g pnpm@latest npm@latest

      - name: Clean install dependencies
        run: pnpm install --frozen-lockfile # Uses dependencies from the lockfile instead of package.json

      - name: Ensure build passes before deploying
        run: pnpm validate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Assuming Vite's default output directory is `dist` inside packages/website
          path: './packages/website/dist'

  deploy-har-analyzer-website:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-har-analyzer-website
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4