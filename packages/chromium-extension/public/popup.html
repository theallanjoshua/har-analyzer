<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Haroscope - Instructions</title>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    p {
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 0;
    }
    .icon {
      width: 24px;
      height: 24px;
    }
    .description {
      color: #666;
      margin-bottom: 16px;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #202124;
        color: #e8eaed;
      }
      .description {
        color: #9aa0a6;
      }
    }
  </style>
</head>
<body>
  <h2>
    <img src="icons/haroscope-128.png" alt="Icon" class="icon" />
    Haroscope
  </h2>
  <p class="description">
    A DevTools extension to capture, view, and analyze HTTP requests.
  </p>
  <p>
    To use this extension, open your <strong>Developer Tools</strong> (F12, or Right Click &rarr; Inspect) and switch to the new <strong>Haroscope</strong> panel.
  </p>
</body>
</html>
